# Railway — Keyra-Projects / esim.keyra.ie
# Connect repo: https://github.com/Ciright-Inc/esim-keyra
# Shared Postgres: DATABASE_URL=${{ Postgres.DATABASE_URL }}

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
